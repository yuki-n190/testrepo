<body>
    <header>
        <h1>電卓</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="../index.html">Home</a></li>

                <li><a href="./calculate.html">Calculator</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="calculator-form">
            <h2>計算式</h2>
            <form id="calculator-form" action="#" method="POST">
                <label for="num1">数値1</label>
                <input type="number" id="num1" name="num1" required>

                <label for="num2">数値2</label>
                <input type="number" id="num2" name="num2" required>

                <label for="operator">演算子</label>
                <select name="operator" id="operator">
                    <option value="not choice">未選択</option>
                    <option value="addition">足し算</option>
                    <option value="subtraction">引き算</option>
                    <option value="multiplication">掛け算</option>
                    <option value="division">割り算</option>
                </select>
            </form>
            
            <p id="formula">ここに計算式が表示されます</p>
            <p id="result">ここに結果が表示されます</p>
        </section>
    </main>
    <footer>

    </footer>
    <script src="./Javascript/calculate.js"></script>
